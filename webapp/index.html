<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA redirect handler — restores the path from the 404 redirect
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <meta name="description" content="AnaToPrint - Convert Medical CT scans into 3D printing instructions" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <title>AnaToPrint</title>
  </head>
  <body>
    <div id="root"></div>                          <!-- React mounts here -->
    <script type="module" src="/src/main.tsx"></script>  <!-- Loads your app -->
  </body>
</html>
